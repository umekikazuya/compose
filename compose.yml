name: base

x-logging-default: &logging-default
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-aws-env: &aws-env
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: testtest
  AWS_DEFAULT_REGION: ap-northeast-1


services:
  mysql:
    build:
      context: ./services/mysql
      dockerfile: Dockerfile
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
      MYSQL_USER: "${DB_USER}"
      MYSQL_PASSWORD: "${DB_PASS}"
    volumes:
      - mysql_data:/var/lib/mysql

  floci:
    build:
      context: ./services/floci
      dockerfile: Dockerfile
    container_name: floci
    ports:
      - "4566:4566"
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: ap-northeast-1
    volumes:
      - floci-data:/app/data

  openapi:
    image: swaggerapi/swagger-ui
    container_name: openapi
    ports:
      - "8081:8080"
    environment:
      TZ: Asia/Tokyo
    logging: *logging-default

volumes:
  mysql_data:
  floci-data:
